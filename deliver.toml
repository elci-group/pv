[[command]]
name = "release build"
cmd = ["cargo", "build", "--release"]
expect_exit = 0
timeout_secs = 300

[[command]]
name = "unit tests"
cmd = ["cargo", "test"]
expect_exit = 0
timeout_secs = 300
stdout_contains = ["test result: ok"]

[[command]]
name = "smoke: live help"
cmd = ["./target/release/pv", "live", "--help"]
expect_exit = 0
stdout_contains = ["Groq"]

[[command]]
name = "smoke: update help"
cmd = ["./target/release/pv", "update", "--help"]
expect_exit = 0
stdout_contains = ["release"]

[[command]]
name = "smoke: intent recognition"
cmd = ["./target/release/pv", "intent", "cargo", "build"]
expect_exit = 0
stdout_contains = ["Build Rust workspace"]

[[command]]
name = "smoke: pressure"
cmd = ["./target/release/pv", "pressure"]
expect_exit = 0
stdout_contains = ["System pressure"]

[[command]]
name = "smoke: explain"
cmd = ["./target/release/pv", "explain"]
expect_exit = 0

[[command]]
name = "smoke: notify"
cmd = ["./target/release/pv", "notify"]
expect_exit = 0
stdout_contains = ["PV::VALVE"]

[[command]]
name = "smoke: habits"
cmd = ["./target/release/pv", "habits"]
expect_exit = 0

[[command]]
name = "bench: baseline invariants"
cmd = ["./target/release/pv_bench", "--check"]
expect_exit = 0
stdout_contains = ["OK"]
