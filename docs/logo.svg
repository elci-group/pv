<svg xmlns="http://www.w3.org/2000/svg" width="240" height="280" viewBox="0 0 240 280">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#414a57"/>
      <stop offset="0.5" stop-color="#2e3540"/>
      <stop offset="1" stop-color="#20262e"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b6675"/>
      <stop offset="1" stop-color="#333b46"/>
    </linearGradient>
    <radialGradient id="face" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#232830"/>
      <stop offset="1" stop-color="#14171c"/>
    </radialGradient>
  </defs>

  <!-- steam -->
  <g fill="none" stroke="#39d6d6" stroke-width="3" stroke-linecap="round">
    <path d="M98 62 c-4 -8 4 -12 0 -20 c-4 -8 4 -12 0 -20" opacity="0.55"/>
    <path d="M120 58 c-4 -8 4 -12 0 -20 c-4 -8 4 -12 0 -20" opacity="0.8"/>
    <path d="M142 62 c-4 -8 4 -12 0 -20 c-4 -8 4 -12 0 -20" opacity="0.55"/>
  </g>

  <!-- gauge -->
  <circle cx="120" cy="116" r="48" fill="url(#rim)" stroke="#171b21" stroke-width="2"/>
  <circle cx="120" cy="116" r="40" fill="url(#face)" stroke="#0d1013" stroke-width="2"/>
  <!-- danger zone -->
  <path d="M158.1 94 A44 44 0 0 1 158.1 138" fill="none" stroke="#c94f2e" stroke-width="5" stroke-linecap="round"/>
  <!-- ticks -->
  <g stroke="#8a939e" stroke-width="2" stroke-linecap="round">
    <line x1="92.3" y1="132" x2="85.4" y2="136"/>
    <line x1="88" y1="116" x2="80" y2="116"/>
    <line x1="92.3" y1="100" x2="85.4" y2="96"/>
    <line x1="104" y1="88.3" x2="100" y2="81.4"/>
    <line x1="120" y1="84" x2="120" y2="76"/>
    <line x1="136" y1="88.3" x2="140" y2="81.4"/>
    <line x1="147.7" y1="100" x2="154.6" y2="96"/>
    <line x1="152" y1="116" x2="160" y2="116"/>
    <line x1="147.7" y1="132" x2="154.6" y2="136"/>
  </g>
  <!-- needle -->
  <line x1="110.6" y1="119.4" x2="148.2" y2="105.7" stroke="#e08030" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="120" cy="116" r="5.5" fill="#c96f2e" stroke="#0d1013" stroke-width="1.5"/>

  <!-- neck + bonnet -->
  <rect x="111" y="162" width="18" height="20" fill="url(#metal)" stroke="#171b21" stroke-width="1.5"/>
  <polygon points="104,182 136,182 148,202 92,202" fill="url(#metal)" stroke="#171b21" stroke-width="1.5"/>

  <!-- valve body tee -->
  <rect x="44" y="202" width="152" height="26" rx="7" fill="url(#metal)" stroke="#15181c" stroke-width="1.5"/>
  <rect x="34" y="195" width="15" height="40" rx="3.5" fill="#3a414b" stroke="#15181c" stroke-width="1.5"/>
  <rect x="191" y="195" width="15" height="40" rx="3.5" fill="#3a414b" stroke="#15181c" stroke-width="1.5"/>
  <g fill="#8a939e">
    <circle cx="41.5" cy="201" r="1.7"/>
    <circle cx="41.5" cy="215" r="1.7"/>
    <circle cx="41.5" cy="229" r="1.7"/>
    <circle cx="198.5" cy="201" r="1.7"/>
    <circle cx="198.5" cy="215" r="1.7"/>
    <circle cx="198.5" cy="229" r="1.7"/>
  </g>
  <!-- base -->
  <rect x="102" y="228" width="36" height="10" rx="2" fill="#20262e" stroke="#15181c" stroke-width="1.5"/>

  <!-- rust wear accents -->
  <g fill="#c96f2e" opacity="0.35">
    <circle cx="70" cy="208" r="2.2"/>
    <circle cx="168" cy="222" r="1.8"/>
    <circle cx="128" cy="196" r="1.5"/>
  </g>

  <!-- wordmark -->
  <text x="120" y="266" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace"
        font-size="13" letter-spacing="4" fill="#8a939e">PRESSURE VALVE</text>
</svg>
